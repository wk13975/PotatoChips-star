<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝贝集赞小星球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffeff5, #e8f4ff);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            color: #ff6b9d;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .like-area {
            text-align: center;
            margin: 30px 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .count-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .count-item {
            text-align: center;
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 15px;
            width: 100%;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }


        .count-item h3 {
            color: #666;
            font-size: 16px;
            margin-bottom: 12px;
        }

        /* 图标显示区域 */
        .icon-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            font-size: 26px;
            min-height: 40px;
        }

        .combined-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            min-height: 40px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            width: 100%;
        }

        .like-btn {
            width: 100px;
            height: 80px;
            border-radius: 30px;
            padding-right:8px;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .like-btn:hover {
            transform: scale(1.1);
            background: #ff4a8a;
        }

        .like-btn:active {
            transform: scale(0.95);
        }

        .heart-animation {
            position: absolute;
            pointer-events: none;
            animation: heart 1s linear forwards;
        }

        @keyframes heart {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(0, -100px); opacity: 0; }
        }

        .prize-section {
            margin-top: 40px;
        }

        .section-title {
            color: #4a90e2;
            font-size: 22px;
            margin-bottom: 15px;
            text-align: center;
        }

        .add-prize {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-prize input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .add-prize input:focus {
            border-color: #4a90e2;
        }

        .add-btn {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .add-btn:hover {
            background: #357abd;
        }

        .prize-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .prize-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prize-info {
            font-size: 18px;
        }

        .prize-star {
            color: #ffd700;
            font-weight: bold;
        }

        .exchange-btn {
            padding: 8px 15px;
            background: #ffd700;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .exchange-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .exchange-btn:hover:not(:disabled) {
            background: #ffed00;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 24px;
            color: #ff6b9d;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .close-modal {
            padding: 10px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .exchange-btn:hover:not(:disabled) {
            background: #ffed00;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .hidden {
            display: none !important;
        }

        .saving {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        .saving {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        .token-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .token-modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .token-modal-title {
            font-size: 22px;
            color: #ff6b9d;
            margin-bottom: 15px;
            text-align: center;
        }

        .token-modal-text {
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.8;
            color: #666;
        }

        .token-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .token-input:focus {
            border-color: #4a90e2;
        }

        .token-help {
            background: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #4a90e2;
        }

        .token-help a {
            color: #4a90e2;
            text-decoration: underline;
        }

        .token-btn-group {
            display: flex;
            gap: 10px;
        }

        .token-submit-btn {
            flex: 1;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .token-submit-btn:hover {
            background: #357abd;
        }

        .token-skip-btn {
            padding: 12px 20px;
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .token-skip-btn:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">🌟 宝贝集赞小星球 🌟</h1>
    <div class="saving" id="savingTip">💾 数据已保存</div>

    <div class="like-area">
        <div class="count-box">
            <div class="count-item">
                <h3>我的成就</h3>
                <div id="combinedIcons" class="combined-icons">暂无数据</div>
            </div>
        </div>
        <div class="button-group">
            <button class="like-btn" id="likeBtn">👍 点赞</button>
            <button class="like-btn" id="starBtn">🌟 奖励</button>
        </div>
    </div>

    <div class="prize-section">
        <h2 class="section-title">🎁 奖品兑换区</h2>
        <div class="add-prize">
            <input type="text" id="prizeName" placeholder="奖品名称">
            <input type="number" id="prizeStar" placeholder="需要星星数" min="1">
            <button class="add-btn" id="addPrizeBtn">添加奖品</button>
        </div>
        <div class="prize-list" id="prizeList"></div>
    </div>
</div>

<div class="modal" id="encourageModal">
    <div class="modal-content">
        <h2 class="modal-title">🎉 欢迎宝贝！🎉</h2>
        <p class="modal-text">
            集满5个赞就能获得1颗星星哦✨<br>
            星星可以兑换超棒的奖品！<br>
            加油加油，你最棒啦！🥳
        </p>
        <button class="close-modal" id="closeModal">我知道啦</button>
    </div>
</div>
<div class="token-modal" id="tokenModal">
    <div class="token-modal-content">
        <h2 class="token-modal-title">🔑 配置 GitHub Token</h2>
        <div class="token-help">
            💡 提示：Token 仅保存在您的浏览器中，不会上传到服务器
        </div>
        <p class="token-modal-text">
            如需同步数据到 GitHub，请输入 Personal Access Token：<br>
            1. 访问 <a href="https://github.com/settings/tokens" target="_blank">GitHub Token 设置</a><br>
            2. 点击 "Generate new token (classic)"<br>
            3. 勾选 <strong>repo</strong> 权限<br>
            4. 生成后复制粘贴到下方
        </p>
        <input type="text" id="tokenInput" class="token-input" placeholder="ghp_xxxxxxxxxxxx 或 github_pat_xxxxxxxxxxxx">
        <div class="token-btn-group">
            <button class="token-submit-btn" id="submitToken">保存并继续</button>
            <button class="token-skip-btn" id="skipToken">跳过（仅本地使用）</button>
        </div>
    </div>
</div>
<script>
    const CONFIG = {
        GITHUB_USERNAME: "wk13975",
        REPO_NAME: "PotatoChips-star",
        TOKEN: "", // 从 LocalStorage 加载
        BRANCH: "main"
    };

    const API_BASE = `https://api.github.com/repos/${CONFIG.GITHUB_USERNAME}/${CONFIG.REPO_NAME}/contents`;
    let currentSHA = { data: null, prizes: null };
    let data = { likes: 0 };
    let prizes = [];

    // 加载保存的 Token
    function loadToken() {
        const savedToken = localStorage.getItem('github_token');
        if (savedToken) {
            CONFIG.TOKEN = savedToken;
            return true;
        }
        return false;
    }

    // 保存 Token
    function saveToken(token) {
        if (token && token.trim()) {
            localStorage.setItem('github_token', token.trim());
            CONFIG.TOKEN = token.trim();
        }
    }

    // 显示提示
    function showSaving(text) {
        const tip = document.getElementById('savingTip');
        tip.textContent = text;
        setTimeout(() => tip.textContent = '💾 数据已保存', 2000);
    }

    // 读取 GitHub 文件
    async function fetchFile(path) {
        if (!CONFIG.TOKEN) {
            throw new Error('未配置 Token');
        }
        try {
            const res = await fetch(`${API_BASE}/${path}`, {
                headers: {
                    Authorization: `Bearer ${CONFIG.TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!res.ok) {
                if (res.status === 401) {
                    showSaving('❌ Token 无效');
                    localStorage.removeItem('github_token');
                    CONFIG.TOKEN = '';
                }
                throw new Error(`HTTP ${res.status}`);
            }
            const json = await res.json();
            if (json.content) {
                // const content = b64_to_utf8(json.content.replace(/\s/g, ''));
                const content = b64_to_utf8(json.content);
                console.log('读取文件成功:', content);
                if (path === 'data.json') currentSHA.data = json.sha;
                if (path === 'prizes.json') currentSHA.prizes = json.sha;
                return JSON.parse(content);
            }
            return path === 'data.json' ? { likes: 0 } : [];
        } catch (e) {
            console.error('读取文件失败:', e);
            throw e;
        }
    }

    function utf8_to_b64(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
            (_, p1) => String.fromCharCode(parseInt(p1, 16))
        ));
    }

    // 解码：Base64 → UTF-8 → Unicode
    function b64_to_utf8(b64) {
        return decodeURIComponent(atob(b64).split('').map(c =>
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
    }

    // 保存到 GitHub
    async function saveFile(path, obj) {
        if (!CONFIG.TOKEN) {
            showSaving('⚠️ 未配置 Token，仅本地保存');
            return;
        }

        showSaving('💾 保存中...');
        const content = utf8_to_b64(JSON.stringify(obj, null, 2));
        console.log('保存文件:', content, obj);
        const body = { message: 'update data', content, branch: CONFIG.BRANCH };
        if (path === 'data.json' && currentSHA.data) body.sha = currentSHA.data;
        if (path === 'prizes.json' && currentSHA.prizes) body.sha = currentSHA.prizes;

        try {
            const res = await fetch(`${API_BASE}/${path}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${CONFIG.TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                if (res.status === 401) {
                    showSaving('❌ Token 无效');
                    localStorage.removeItem('github_token');
                    CONFIG.TOKEN = '';
                } else {
                    showSaving(`❌ 保存失败: ${res.status}`);
                }
                return;
            }

            const result = await res.json();
            if (path === 'data.json') currentSHA.data = result.content.sha;
            if (path === 'prizes.json') currentSHA.prizes = result.content.sha;
            showSaving('✅ 同步成功！');
        } catch (e) {
            console.error('保存失败:', e);
            showSaving('❌ 网络错误');
        }
    }

    // 加载云端数据
    async function loadFromCloud() {
        if (!CONFIG.TOKEN) {
            showSaving('⚠️ 使用本地模式');
            return;
        }

        showSaving('🔄 同步数据...');
        try {
            data = await fetchFile('data.json');
            prizes = await fetchFile('prizes.json');
            showSaving('✅ 已同步');
        } catch (e) {
            showSaving('⚠️ 使用本地数据');
        }
    }
    // ==============================================
    // 核心：纯图标显示（无数字）
    // ==============================================
    function renderAll() {
        const combinedBox = document.getElementById('combinedIcons');
        let likes = data.likes % 5;
        let stars = Math.floor(data.likes / 5);

        let html = '';
        if (stars > 0) {
            html += '🌟'.repeat(stars);
        }
        if (likes > 0) {
            if (html) html += ' ';
            html += '👍'.repeat(likes);
        }
        combinedBox.innerHTML = html || '暂无数据';
        renderPrizes();
        checkPrizeDisabled();
    }

    // 点赞动画
    function createHeartAnimation() {
        const heart = document.createElement('div');
        heart.textContent = '❤️';
        heart.className = 'heart-animation';
        heart.style.left = Math.random() * 80 + 10 + '%';
        heart.style.fontSize = '24px';
        document.querySelector('.like-area').appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }

    // 点赞
    document.getElementById('likeBtn').addEventListener('click', async () => {
        data.likes++;
        createHeartAnimation();
        renderAll();
        await saveFile('data.json', data);
    });

    document.getElementById('starBtn').addEventListener('click', async () => {
        data.likes = data.likes+5;
        createHeartAnimation();
        renderAll();
        await saveFile('data.json', data);
    });

    // 渲染奖品
    function renderPrizes() {
        const list = document.getElementById('prizeList');
        list.innerHTML = '';
        prizes.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'prize-item';
            item.innerHTML = `
                    <div class="prize-info">
                        ${p.name} <span class="prize-star">(${'🌟'.repeat(p.star)})</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <button class="exchange-btn" data-i="${i}" data-s="${p.star}">立即兑换</button>
                        <button class="delete-btn" data-i="${i}" title="删除奖品">🗑</button>
                    </div>
                `;
            list.appendChild(item);
        });
        bindExchange();
        bindDelete();
    }

    // 添加奖品
    document.getElementById('addPrizeBtn').addEventListener('click', async () => {
        const name = document.getElementById('prizeName').value.trim();
        const star = parseInt(document.getElementById('prizeStar').value);
        if (!name || isNaN(star) || star < 1) return alert('请输入正确内容');
        prizes.push({ name, star });
        renderAll();
        await saveFile('prizes.json', prizes);
        document.getElementById('prizeName').value = '';
        document.getElementById('prizeStar').value = '';
    });

    // 兑换
    function bindExchange() {
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const need = parseInt(btn.dataset.s)*5;
                const i = parseInt(btn.dataset.i);
                if (data.likes >= need) {
                    data.likes -= need;
                    renderAll();
                    await saveFile('data.json', data);
                    alert(`兑换成功：${prizes[i].name} 🎉`);
                }
            });
        });
    }
    // 删除奖品
    function bindDelete() {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const i = parseInt(btn.dataset.i);
                const prizeName = prizes[i].name;
                if (confirm(`确定要删除奖品"${prizeName}"吗？`)) {
                    prizes.splice(i, 1);
                    renderAll();
                    await saveFile('prizes.json', prizes);
                }
            });
        });
    }
    // 按钮状态
    function checkPrizeDisabled() {
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.disabled = data.likes/5 < parseInt(btn.dataset.s);
        });
    }
    // 关闭弹窗
    document.getElementById('closeModal').addEventListener('click', () => {
        document.getElementById('encourageModal').classList.add('hidden');
    });
    // 启动
    window.onload = async () => {
        await loadFromCloud();
        setTimeout(() => {
            document.getElementById('encourageModal').classList.remove('hidden');
        }, 600);
    };

    // 关闭弹窗
    document.getElementById('closeModal').addEventListener('click', () => {
        document.getElementById('encourageModal').classList.add('hidden');
    });

    // Token 提交
    document.getElementById('submitToken').addEventListener('click', () => {
        const token = document.getElementById('tokenInput').value.trim();
        if (token) {
            saveToken(token);
            document.getElementById('tokenModal').style.display = 'none';
            showSaving('✅ Token 已保存');
            initializeApp();
        } else {
            alert('请输入 Token 或点击跳过按钮');
        }
    });

    // 跳过 Token
    document.getElementById('skipToken').addEventListener('click', () => {
        document.getElementById('tokenModal').style.display = 'none';
        showSaving('⚠️ 本地模式（数据不云同步）');
        initializeApp();
    });

    // 回车提交
    document.getElementById('tokenInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('submitToken').click();
        }
    });

    // 初始化应用
    async function initializeApp() {
        await loadFromCloud();
        renderAll();
        setTimeout(() => {
            document.getElementById('encourageModal').classList.remove('hidden');
        }, 600);
    }

    // 启动
    window.onload = () => {
        const hasToken = loadToken();
        if (hasToken) {
            // 已有 Token，直接初始化
            document.getElementById('tokenModal').style.display = 'none';
            initializeApp();
        } else {
            // 显示 Token 输入框
            document.getElementById('tokenModal').style.display = 'flex';
        }
    };
</script>
</body>
</html>
